name: Deploy Backend to Render

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'server/**'

jobs:
  deploy:
    name: Trigger Render Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Webhook
        run: curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK || 'https://api.render.com/deploy/srv-d70rle7fte5s7385ftvg?key=z5GtHMgsRuY' }}
